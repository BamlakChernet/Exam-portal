<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Login | Exam Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>
<div class="container" id="loginPage">
  
  <!-- Login Form -->
  <div id="loginForm">
    <h2>Login</h2>

    <label>Email</label>
    <input type="email" id="loginEmail">

    <label>Password</label>
    <input type="password" id="loginPassword">

    <select id="loginRole">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
     <option value="admin">Admin</option>
    </select>

    <button type="button" onclick="login()">Login</button>
    <p class="toggle">Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
    <p id="loginError" class="error"></p>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" class="hidden">
    <h2>Sign Up</h2>
    <label >Full Name</label>
    <input type="text" id="name" required placeholder="Enter your full name">


    <label>Email</label>
    <input type="email" id="signupEmail" required placeholder="Enter a valid email">

    <label>Password</label>
    <input type="password" id="signupPassword" required minlength="6" placeholder="Minimum 6 characters">
<label>Confirm Password</label>
    <input type="password" id="signupConfirmPassword" required minlength="6" placeholder="Confirm password">
    
    <select id="signupRole">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
   
    </select>

    <button type="button" onclick="signup()">Sign Up</button>
    <p class="toggle">Already have an account? <span onclick="showLogin()">Login</span></p>
    <p id="signupError" class="error"></p>
  </div>

</div>


<script src="js/auth.js"></script>
   <script src="js/api.js"></script>
</body>
</html>
